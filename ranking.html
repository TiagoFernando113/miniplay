<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Ranking</title>
  <link rel="stylesheet" href="css/estilo.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="js/tema.js"></script>
  <style>
    .lista-ranking { max-width: 440px; margin: 0 auto; padding: 0 16px 40px; }
    .linha-rank {
      display: flex; align-items: center; gap: 12px;
      background: var(--card-bg); border-radius: 12px;
      padding: 10px 14px; margin-bottom: 6px;
      font-weight: 600; font-size: 0.92rem;
    }
    .linha-rank .pos { width: 34px; text-align: center; font-weight: 800; color: var(--text-dim); }
    .linha-rank .pos.p1 { color: #ffd54f; }
    .linha-rank .pos.p2 { color: #cfd6de; }
    .linha-rank .pos.p3 { color: #e0955f; }
    .enf svg { width: 14px; height: 14px; vertical-align: -2px; }
    .enf-pres svg { color: #7fdfff; }
    .enf-streak { color: #ff9f4f; font-weight: 800; font-size: 0.78rem; }
    .enf-streak svg { color: #ff9f4f; }
    .linha-rank .nome { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .linha-rank .pts { color: var(--accent); font-weight: 800; }
    .linha-rank.eu { border: 2px solid var(--accent); background: linear-gradient(90deg, var(--card-bg), rgba(79,140,255,0.15)); }
    .seletor-jogo {
      display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 12px;
      max-width: 640px; margin: 0 auto; scrollbar-width: none;
    }
    .seletor-jogo::-webkit-scrollbar { display: none; }
    .aba-jogo {
      flex: 0 0 auto; background: var(--card-bg); color: var(--text-dim);
      border: 1px solid #333; border-radius: 20px; padding: 8px 16px;
      font-weight: 700; font-size: 0.85rem; white-space: nowrap;
    }
    .aba-jogo.ativa { background: var(--accent); color: #fff; border-color: var(--accent); }
    .cartao-gap {
      max-width: 440px; margin: 0 auto 12px; padding: 14px 16px;
      background: linear-gradient(90deg, rgba(255,159,79,0.12), var(--card-bg));
      border: 1px solid #cf8f2f; border-radius: 14px; text-align: center;
      font-weight: 700;
    }
    .cartao-gap .grande { font-size: 1.3rem; color: #ffd54f; }
    .aviso-local { text-align: center; color: var(--text-dim); font-size: 0.75rem; padding: 8px 24px 30px; }
  </style>
</head>
<body>
  <a class="voltar" href="index.html">← voltar</a>

  <header>
    <h1><span class="icone-titulo" data-icone="ranking"></span> Ranking</h1>
    <p id="subtitulo">Escolha uma categoria</p>
  </header>

  <div class="seletor-jogo" id="abas"></div>
  <div id="gap"></div>
  <div class="lista-ranking" id="lista"></div>
  <p class="aviso-local" id="aviso"></p>

  <script src="js/icones.js"></script>
  <script src="js/util.js"></script>
  <script src="js/pontos.js"></script>
  <script src="js/som.js"></script>
  <script src="js/musica.js"></script>
  <script src="js/recordes.js"></script>
  <script src="js/conquistas.js"></script>
  <script src="js/missoes.js"></script>
  <script src="js/nuvem.js"></script>
  <script src="js/app.js"></script>
  <script>
    const listaEl = document.getElementById("lista");
    const gapEl = document.getElementById("gap");
    const abasEl = document.getElementById("abas");
    const avisoEl = document.getElementById("aviso");
    const subEl = document.getElementById("subtitulo");
    const MEDALHAS = [];
    const meuId = Nuvem.deviceId();

    // abas: Geral (pontos da semana) + um por jogo rankeado
    const CATEGORIAS = [{ id: "geral", nome: "Geral (total)" }].concat(
      Object.entries(RANKING_JOGOS).map(([id, j]) => ({ id, nome: j.nome }))
    );
    let atual = "geral";

    CATEGORIAS.forEach((c) => {
      const b = document.createElement("button");
      b.className = "aba-jogo" + (c.id === atual ? " ativa" : "");
      b.textContent = c.nome;
      b.addEventListener("click", () => {
        atual = c.id;
        document.querySelectorAll(".aba-jogo").forEach((x) => x.classList.remove("ativa"));
        b.classList.add("ativa");
        Som.clique();
        carregar();
      });
      abasEl.appendChild(b);
    });

    function linha(pos, nome, valor, ehEu, rotulo, sufixo) {
      const corPos = pos <= 3 ? " p" + pos : "";
      return `<div class="linha-rank${ehEu ? " eu" : ""}">
        <span class="pos${corPos}">${pos}º</span>
        <span class="nome">${escaparHtml(nome)}${sufixo || ""}</span>
        <span class="pts">${valor}${rotulo ? " " + rotulo : ""}</span>
      </div>`;
    }

    // cache: mostra na hora o que já foi visto, atualiza em segundo plano
    const cache = JSON.parse(localStorage.getItem("cacheRanking") || "{}");
    function salvarCache(chave, html, gap) {
      cache[chave] = { html, gap, sub: subEl.textContent };
      localStorage.setItem("cacheRanking", JSON.stringify(cache));
    }

    async function carregar() {
      // 1) mostra instantâneo o que estiver em cache
      if (cache[atual]) {
        subEl.textContent = cache[atual].sub || "";
        listaEl.innerHTML = cache[atual].html;
        gapEl.innerHTML = cache[atual].gap || "";
        aplicarIcones();
      } else {
        gapEl.innerHTML = "";
        listaEl.innerHTML = '<p style="text-align:center;color:var(--text-dim);">Carregando...</p>';
      }

      if (atual === "geral") {
        subEl.textContent = "Todos os jogadores — pontos totais";
        Nuvem.enviarPontuacao(Pontos.acumulado()); // sobe o acumulado, não a semana
        const online = await Nuvem.buscarRanking();
        const enfeite = (r) =>
          (r.prestigio ? ` <span class="enf enf-pres">${ICONES.gema}</span>` : "") +
          (r.streak >= 2 ? ` <span class="enf enf-streak">${ICONES.fogo}${r.streak}</span>` : "");
        const lista = online ? online.map((r) => ({
          nome: (r.titulo ? r.titulo + " " : "") + (r.device_id === meuId ? r.apelido + " (você)" : r.apelido),
          valor: r.pontos, eu: r.device_id === meuId, suf: enfeite(r),
        })) : [];
        if (atual !== "geral") return;
        if (online) {
          lista.sort((a, b) => b.valor - a.valor);
          const html = lista.map((j, i) => linha(i + 1, j.nome, j.valor, j.eu, "pts", j.suf)).join("")
            || '<p style="text-align:center;color:var(--text-dim);">Ninguém no ranking ainda.</p>';
          listaEl.innerHTML = html;
          salvarCache("geral", html, "");
          avisoEl.textContent = "Ranking mundial por pontos totais.";
        } else if (!cache.geral) {
          listaEl.innerHTML = '<p style="text-align:center;color:var(--text-dim);">Sem conexão — abra com internet.</p>';
        }
        aplicarIcones();
        return;
      }

      // ranking de um jogo específico
      const info = RANKING_JOGOS[atual];
      subEl.textContent = `Melhores do ${info.nome} — top 10`;
      const meuRecorde = Recordes.get(atual) || 0;
      if (window.Nuvem) Nuvem.enviarRecorde(atual, meuRecorde); // não trava
      const catAlvo = atual;
      const top = await Nuvem.buscarTopJogo(atual, 10);
      if (catAlvo !== atual) return; // trocou de aba

      if (!top) {
        if (!cache[atual]) {
          listaEl.innerHTML = '<p style="text-align:center;color:var(--text-dim);">Sem conexão — jogue e volte quando tiver internet.</p>';
          avisoEl.textContent = "";
        }
        return;
      }

      const naLista = top.some((r) => r.device_id === meuId);
      const listaHtml = top.map((r, i) =>
        linha(i + 1, (r.device_id === meuId ? r.apelido + " (você)" : r.apelido), r.valor, r.device_id === meuId, info.rotulo)
      ).join("") || '<p style="text-align:center;color:var(--text-dim);">Ninguém marcou aqui ainda — seja o primeiro! 🏆</p>';
      listaEl.innerHTML = listaHtml;

      // cartão "quanto falta pro top 10"
      let gapHtml = "";
      if (!naLista) {
        const decimo = top.length >= 10 ? top[9].valor : 0;
        if (top.length < 10) {
          gapHtml = `<div class="cartao-gap">Seu recorde: <span class="grande">${meuRecorde}</span> ${info.rotulo}<br/>
            <span style="color:var(--text-dim);font-weight:400;">Ainda tem vaga no top 10 — jogue e entre!</span></div>`;
        } else {
          const falta = Math.max(1, decimo + 1 - meuRecorde);
          gapHtml = `<div class="cartao-gap">Seu recorde: <span class="grande">${meuRecorde}</span> ${info.rotulo}<br/>
            Faltam <span class="grande">${falta}</span> pra entrar no <strong>top 10</strong>!</div>`;
        }
      } else {
        const pos = top.findIndex((r) => r.device_id === meuId) + 1;
        gapHtml = `<div class="cartao-gap">🎉 Você está em <span class="grande">${pos}º</span> lugar no ${info.nome}!</div>`;
      }
      gapEl.innerHTML = gapHtml;
      salvarCache(atual, listaHtml, gapHtml);
      avisoEl.textContent = "🌐 Ranking mundial por jogo — bata seu recorde pra subir!";
      aplicarIcones();
    }

    carregar();
  </script>
</body>
</html>
