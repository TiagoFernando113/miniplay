<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Jogo da Velha</title>
  <link rel="stylesheet" href="../../css/estilo.css" />
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="../../js/tema.js"></script>
  <style>
    .tabuleiro-velha {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      max-width: 300px;
      margin: 0 auto;
    }
    .celula {
      aspect-ratio: 1 / 1;
      background: var(--card-bg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      cursor: pointer;
      user-select: none;
    }
    .celula.vencedora { background: #1f5f3f; }
  </style>
</head>
<body>
  <a class="voltar" href="../../index.html">← voltar</a>

  <div class="tela-jogo">
    <h1><span class="icone-titulo" data-icone="velha"></span> Jogo da Velha</h1>

    <div class="seletor" id="seletor-modo">
      <button data-modo="bot" class="ativo">vs Bot</button>
      <button data-modo="duo">2 Jogadores</button>
      <button data-modo="online">Online</button>
    </div>

    <div id="painel-online" style="display:none; margin-bottom:14px;">
      <div style="display:flex; gap:8px; justify-content:center; margin-bottom:8px;">
        <button class="btn" id="btn-criar-sala" style="font-size:0.9rem;">Criar sala</button>
        <input type="text" id="campo-sala" maxlength="4" placeholder="CÓDIGO"
          style="width:90px;text-transform:uppercase;text-align:center;background:var(--card-bg);color:var(--text);border:1px solid #444;border-radius:10px;font-size:1rem;font-weight:700;user-select:text;-webkit-user-select:text;" />
        <button class="btn" id="btn-entrar-sala" style="font-size:0.9rem;">Entrar</button>
      </div>
      <p class="msg-pontos" id="status-online" style="margin:4px 0;"></p>
    </div>

    <p class="placar" id="legenda">Você é ❌ — o bot é ⭕</p>
    <div id="tabuleiro" class="tabuleiro-velha"></div>
    <p class="msg-pontos" id="mensagem"></p>
    <button class="btn" id="reiniciar">Reiniciar</button>
  </div>

  <script src="../../js/icones.js"></script>
  <script src="../../js/util.js"></script>
  <script src="../../js/pontos.js"></script>
  <script src="../../js/som.js"></script>
  <script src="../../js/musica.js"></script>
  <script src="../../js/recordes.js"></script>
  <script src="../../js/conquistas.js"></script>
  <script src="../../js/missoes.js"></script>
  <script src="../../js/nuvem.js"></script>
  <script src="../../vendor/supabase.js"></script>
  <script src="../../js/online.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/modal.js"></script>
  <script src="jogo.js"></script>
</body>
</html>
