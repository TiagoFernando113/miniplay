<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Caça-Palavras</title>
  <link rel="stylesheet" href="../../css/estilo.css" />
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="../../js/tema.js"></script>
  <style>
    .grade-caca {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 2px;
      max-width: 360px;
      margin: 0 auto;
    }
    .letra {
      aspect-ratio: 1 / 1;
      background: var(--card-bg);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      user-select: none;
    }
    .letra.selecionada { background: var(--accent); color: #fff; }
    .letra.achada { background: #1f5f3f; color: #fff; }
    .palavras {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 14px 0;
    }
    .palavras span {
      background: var(--card-bg);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .palavras span.achada {
      background: #1f5f3f;
      text-decoration: line-through;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <a class="voltar" href="../../index.html">← voltar</a>

  <div class="tela-jogo">
    <h1><span class="icone-titulo" data-icone="cacapalavras"></span> Caça-Palavras</h1>
    <div class="placar">
      <span>Nível: <strong id="nivel">1</strong></span>
      <span>Achadas: <strong id="contagem">0</strong> / <span id="total">6</span></span>
    </div>
    <p class="msg-pontos" id="mensagem">Toque na 1ª e na última letra da palavra</p>

    <div class="palavras" id="lista-palavras"></div>
    <div id="grade" class="grade-caca"></div>

    <button class="btn" id="reiniciar" style="margin-top:20px;">Novo jogo</button>
  </div>

  <script src="../../js/icones.js"></script>
  <script src="../../js/util.js"></script>
  <script src="../../js/pontos.js"></script>
  <script src="../../js/som.js"></script>
  <script src="../../js/musica.js"></script>
  <script src="../../js/recordes.js"></script>
  <script src="../../js/conquistas.js"></script>
  <script src="../../js/missoes.js"></script>
  <script src="../../js/palavras.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/modal.js"></script>
  <script src="jogo.js"></script>
</body>
</html>
