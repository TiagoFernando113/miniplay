<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Cobra Batalha</title>
  <link rel="stylesheet" href="../../css/estilo.css" />
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="../../js/tema.js"></script>
</head>
<body class="pagina-cheia" data-paisagem>
  <canvas id="tela"></canvas>

  <div class="hud">
    <button class="hud-chip" id="btn-voltar">←</button>
    <span class="hud-chip">🐍 <strong id="placar">0</strong> · 🏆 <strong id="melhor">0</strong></span>
    <button class="hud-chip" id="btn-lobby">☰</button>
  </div>

  <button id="btn-turbo">⚡<span>TURBO</span></button>
  <style>
    #btn-turbo {
      position: fixed; bottom: 40px; right: 20px; z-index: 80;
      width: 84px; height: 84px; border-radius: 50%;
      border: 2px solid rgba(255,213,79,0.6); background: rgba(60,50,10,0.55);
      color: #ffd54f; font-size: 1.6rem; font-weight: 800;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      touch-action: none; user-select: none;
    }
    #btn-turbo span { font-size: 0.6rem; letter-spacing: 1px; }
    #btn-turbo.ativo { background: rgba(255,213,79,0.85); color: #222; transform: scale(0.94); }
  </style>

  <script src="../../js/util.js"></script>
  <script src="../../js/pontos.js"></script>
  <script src="../../js/som.js"></script>
  <script src="../../js/musica.js"></script>
  <script src="../../js/recordes.js"></script>
  <script src="../../js/conquistas.js"></script>
  <script src="../../js/missoes.js"></script>
  <script src="../../js/nuvem.js"></script>
  <script src="../../vendor/supabase.js"></script>
  <script src="../../js/online.js"></script>
  <script src="../../js/lobby.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/modal.js"></script>
  <script src="jogo.js"></script>
</body>
</html>
