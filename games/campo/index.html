<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Campo Minado</title>
  <link rel="stylesheet" href="../../css/estilo.css" />
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="../../js/tema.js"></script>
  <style>
    .grade-campo {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 3px;
      max-width: 340px;
      margin: 0 auto;
    }
    .quadrado {
      aspect-ratio: 1 / 1;
      background: #3a3a4a;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      font-weight: 700;
      user-select: none;
    }
    .quadrado.aberto { background: var(--card-bg); }
    .quadrado.mina { background: #7f2a1f; }
    .n1 { color: #6f9fff; } .n2 { color: #6fdf6f; } .n3 { color: #ff8f6f; }
    .n4 { color: #cf8fff; } .n5 { color: #ffd54f; } .n6 { color: #6fdfdf; }
    .n7 { color: #ff6fa5; } .n8 { color: #ffffff; }
    .modo-bandeira { margin-top: 16px; }
    .modo-bandeira.ativo { background: #cf8f2f; }
  </style>
</head>
<body>
  <a class="voltar" href="../../index.html">← voltar</a>

  <div class="tela-jogo">
    <h1><span class="icone-titulo" data-icone="campo"></span> Campo Minado</h1>
    <div class="placar">
      <span>Nível: <strong id="nivel">1</strong></span>
      <span>Minas: <strong id="total-minas">10</strong></span>
      <span>🚩 <strong id="bandeiras">0</strong></span>
      <span>⏱️ <strong id="cronometro">0</strong>s</span>
    </div>

    <div id="grade" class="grade-campo"></div>

    <button class="btn modo-bandeira" id="modo">⛏️ Modo: cavar</button>
    <p class="msg-pontos" id="mensagem">Toque para abrir — ative 🚩 para marcar minas</p>
    <button class="btn" id="reiniciar">Reiniciar</button>
  </div>

  <script src="../../js/icones.js"></script>
  <script src="../../js/util.js"></script>
  <script src="../../js/pontos.js"></script>
  <script src="../../js/som.js"></script>
  <script src="../../js/musica.js"></script>
  <script src="../../js/recordes.js"></script>
  <script src="../../js/conquistas.js"></script>
  <script src="../../js/missoes.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/modal.js"></script>
  <script src="jogo.js"></script>
</body>
</html>
