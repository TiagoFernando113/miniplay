<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Termo</title>
  <link rel="stylesheet" href="../../css/estilo.css" />
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="../../js/tema.js"></script>
  <style>
    .termo-tela { max-width: 400px; margin: 0 auto; padding: 8px 12px 20px; text-align: center; }
    .termo-grade { display: grid; grid-template-rows: repeat(6, 1fr); gap: 6px; margin: 10px auto; max-width: 320px; }
    .termo-linha { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .termo-cel {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; border-radius: 8px; background: var(--card-bg);
      border: 2px solid #333; text-transform: uppercase; color: var(--text);
    }
    .termo-cel.certo { background: #3aa856; border-color: #3aa856; color: #fff; }
    .termo-cel.perto { background: #d9a520; border-color: #d9a520; color: #fff; }
    .termo-cel.fora { background: #3a3a44; border-color: #3a3a44; color: #fff; }
    .termo-teclado { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
    .termo-fileira { display: flex; gap: 4px; justify-content: center; }
    .tecla {
      flex: 1; max-width: 34px; padding: 12px 0; border-radius: 6px; background: var(--card-bg);
      color: var(--text); font-weight: 700; font-size: 0.9rem; border: none;
    }
    .tecla.larga { max-width: 52px; font-size: 0.7rem; }
    .tecla.certo { background: #3aa856; color: #fff; }
    .tecla.perto { background: #d9a520; color: #fff; }
    .tecla.fora { background: #2a2a30; color: #888; }
  </style>
</head>
<body>
  <a class="voltar" href="../../index.html">← voltar</a>
  <div class="termo-tela">
    <p style="color:var(--text-dim);font-weight:700;">Vitórias: <strong id="melhor">0</strong></p>
    <div class="termo-grade" id="grade"></div>
    <div class="termo-teclado" id="teclado"></div>
  </div>
  <script src="../../js/util.js"></script>
  <script src="../../js/pontos.js"></script>
  <script src="../../js/som.js"></script>
  <script src="../../js/musica.js"></script>
  <script src="../../js/recordes.js"></script>
  <script src="../../js/conquistas.js"></script>
  <script src="../../js/missoes.js"></script>
  <script src="../../js/nuvem.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/modal.js"></script>
  <script src="jogo.js"></script>
</body>
</html>
