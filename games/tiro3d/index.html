<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Tiro 3D</title>
  <link rel="stylesheet" href="../../css/estilo.css" />
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="../../js/tema.js"></script>

<body class="pagina-cheia" data-paisagem>
  <canvas id="tela"></canvas>
  <div class="hud">
    <a class="hud-chip" href="../../index.html">←</a>
    <span class="hud-chip">Onda <strong id="onda">1</strong> · <strong id="placar">0</strong> · 🏆 <strong id="melhor">0</strong></span>
    <button class="hud-chip" id="reiniciar">🔄</button>
  </div>
  <button id="btn-atirar">🔫</button>
  <style>
    #btn-atirar {
      position: fixed; bottom: 40px; right: 24px; z-index: 80;
      width: 90px; height: 90px; border-radius: 50%;
      border: 2px solid rgba(255,120,80,0.7); background: rgba(60,20,10,0.5);
      color: #ff8f6f; font-size: 2rem; touch-action: none; user-select: none;
    }
    #btn-atirar.ativo { background: rgba(255,120,80,0.85); transform: scale(0.94); }
  </style>
  <p class="hud-msg" id="mensagem">Esquerda: andar · Direita: mirar · 🔫 pra atirar!</p>

  <script src="../../js/pontos.js"></script>

  <script src="jogo.js"></script>
