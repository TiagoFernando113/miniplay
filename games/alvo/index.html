<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Acerte o Alvo</title>
  <link rel="stylesheet" href="../../css/estilo.css" />
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="../../js/tema.js"></script>
  <style>
    .grade-alvo {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 320px;
      margin: 0 auto;
    }
    .buraco {
      aspect-ratio: 1 / 1;
      background: var(--card-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
  <a class="voltar" href="../../index.html">← voltar</a>

  <div class="tela-jogo">
    <h1><span class="icone-titulo" data-icone="alvo"></span> Acerte o Alvo</h1>
    <div class="placar">
      <span>Acertos: <strong id="acertos">0</strong></span>
      <span>Tempo: <strong id="tempo">30</strong>s</span>
      <span>Melhor: <strong id="melhor">0</strong></span>
    </div>

    <div id="grade" class="grade-alvo"></div>

    <p class="msg-pontos" id="mensagem">Toque nas toupeiras que aparecerem!</p>
    <div style="display:flex; gap:8px; justify-content:center;">
      <button class="btn" id="iniciar">Iniciar</button>
      <button class="btn" id="pausar">⏸️ Pausar</button>
    </div>
  </div>

  <script src="../../js/icones.js"></script>
  <script src="../../js/util.js"></script>
  <script src="../../js/pontos.js"></script>
  <script src="../../js/som.js"></script>
  <script src="../../js/musica.js"></script>
  <script src="../../js/recordes.js"></script>
  <script src="../../js/conquistas.js"></script>
  <script src="../../js/missoes.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/modal.js"></script>
  <script src="jogo.js"></script>
</body>
</html>
