<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Batalha Naval</title>
  <link rel="stylesheet" href="../../css/estilo.css" />
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="../../js/tema.js"></script>
  <style>
    h2 { font-size: 1rem; margin: 14px 0 6px; color: var(--text-dim); }
    .grade-naval {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 3px;
      max-width: 320px;
      margin: 0 auto;
    }
    .agua {
      aspect-ratio: 1 / 1;
      background: #16324a;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      user-select: none;
    }
    .grade-naval.inimiga .agua { cursor: pointer; }
    .agua.navio { background: #4a5a6a; }
    .agua.tiro-agua { background: #0a1f30; }
    .agua.tiro-acerto { background: #7f2a1f; }
    .grade-naval.pequena {
      max-width: 200px;
    }
    .grade-naval.pequena .agua { font-size: 0.65rem; border-radius: 3px; }
  </style>
</head>
<body>
  <a class="voltar" href="../../index.html">← voltar</a>

  <div class="tela-jogo">
    <h1><span class="icone-titulo" data-icone="naval"></span> Batalha Naval</h1>
    <p class="msg-pontos" id="mensagem">Afunde os 4 navios do bot!</p>

    <h2>🌊 Mar inimigo — toque para atirar</h2>
    <div id="grade-inimiga" class="grade-naval inimiga"></div>

    <h2>⚓ Sua frota</h2>
    <div id="grade-minha" class="grade-naval pequena"></div>

    <button class="btn" id="reiniciar" style="margin-top:20px;">Nova batalha</button>
  </div>

  <script src="../../js/icones.js"></script>
  <script src="../../js/util.js"></script>
  <script src="../../js/pontos.js"></script>
  <script src="../../js/som.js"></script>
  <script src="../../js/musica.js"></script>
  <script src="../../js/recordes.js"></script>
  <script src="../../js/conquistas.js"></script>
  <script src="../../js/missoes.js"></script>
  <script src="../../js/app.js"></script>
  <script src="../../js/modal.js"></script>
  <script src="jogo.js"></script>
</body>
</html>
