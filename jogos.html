  <script src="js/app.js"></script>
  <script>
    // recordes nos cards
    document.querySelectorAll("[data-recorde]").forEach((card) => {
      const valor = Recordes.get(card.dataset.recorde);
      if (valor !== undefined) {
        card.querySelector(".recorde-card").textContent =
          "🏆 " + card.dataset.rotulo.replace("{v}", valor);
      }
    });

    // selo ×2 no Jogo da Semana
    const cardSemana = document.querySelector(`a[href*="games/${JogoDaSemana.atual()}/"]`);
    if (cardSemana) {
      const selo = document.createElement("span");
      selo.textContent = "×2";
      selo.style.cssText = "position:absolute;top:6px;right:8px;background:#ffd54f;color:#222;font-size:0.7rem;font-weight:800;padding:1px 7px;border-radius:8px;";
      cardSemana.style.position = "relative";
      cardSemana.style.border = "1px solid #ffd54f";
      cardSemana.appendChild(selo);
      // jogo da semana sempre em primeiro na lista
      cardSemana.style.setProperty("--i", "0");
      cardSemana.parentElement.prepend(cardSemana);
    }

    aplicarIcones();

    // presença online ao vivo: badge de quem está jogando agora
    async function atualizarPresenca() {
      if (!window.Nuvem) return;
      const cont = await Nuvem.contarOnline();
      const mapa = { cobrabatalha: "cobrabatalha", bolhas: "bolhas", velha: "velha" };
      Object.entries(mapa).forEach(([jogo]) => {
        const card = document.querySelector(`a[href*="games/${jogo}/"]`);
        if (!card) return;
        let badge = card.querySelector(".badge-online");
        const n = cont[jogo] || 0;
        if (n > 0) {
          if (!badge) {
            badge = document.createElement("span");
            badge.className = "badge-online";
            card.style.position = "relative";
            card.appendChild(badge);
          }
          badge.textContent = `🟢 ${n} jogando`;
        } else if (badge) { badge.remove(); }
      });
    }
    atualizarPresenca();
    setInterval(atualizarPresenca, 15000);
  </script>
