<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Jogar</title>
  <link rel="stylesheet" href="css/estilo.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="js/tema.js"></script>
  <style>
    .secao-titulo {
      max-width: 640px; margin: 22px auto 8px; padding: 0 16px;
      display: flex; align-items: center; gap: 8px;
      font-size: 1rem; font-weight: 800; color: var(--text);
    }
    .secao-titulo .tag {
      font-size: 0.62rem; font-weight: 800; padding: 2px 8px; border-radius: 8px;
      background: var(--accent); color: #fff; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .secao-titulo .tag.online { background: #2fb85f; }
    .secao-titulo .tag.semana { background: #ffd54f; color: #222; }
    .card-jogo .badge-online, .card-jogo .selo-x2, .card-jogo .selo-novo {
      position: absolute; font-size: 0.6rem; font-weight: 800; padding: 2px 7px; border-radius: 8px; z-index: 2;
    }
    .card-jogo .selo-x2 { top: 6px; right: 8px; background: #ffd54f; color: #222; }
    .card-jogo .selo-novo { top: 6px; left: 8px; background: #ff6f6f; color: #fff; }
  </style>
</head>
<body>
  <a class="voltar" href="index.html">← voltar</a>

  <header>
    <h1><span class="icone-titulo" data-icone="jogar"></span> Escolha seu jogo</h1>
    <p class="pontos-hub"><span class="icone-inline" data-icone="estrela"></span> Pontos: <strong id="pontos-totais">0</strong></p>
  </header>

  <div id="secoes"></div>

  <script src="js/icones.js"></script>
  <script src="js/util.js"></script>
  <script src="js/pontos.js"></script>
  <script src="js/som.js"></script>
  <script src="js/musica.js"></script>
  <script src="js/recordes.js"></script>
  <script src="js/conquistas.js"></script>
  <script src="js/missoes.js"></script>
  <script src="js/nuvem.js"></script>
  <script src="js/app.js"></script>
  <script>
    // catálogo de jogos (novos: nova:true; online: online:true)
    const JOGOS = [
      { s: "cobrabatalha", n: "Cobra Batalha", rec: "cobrabatalha", rot: "tamanho {v}", online: true, nova: true },
      { s: "tanques", n: "Tanques", rec: "tanques", rot: "nível {v}", online: true, nova: true },
      { s: "bolhas", n: "Bolhas", rec: "bolhas", rot: "tamanho {v}", online: true },
      { s: "velha", n: "Jogo da Velha", rec: "velhaVitorias", rot: "{v} vitórias", online: true },
      { s: "pingue", n: "Pingue-Pongue", rec: "pingueVitorias", rot: "{v} vitórias", nova: true },
      { s: "quebrablocos", n: "Quebra-Blocos", rec: "quebrablocos", rot: "recorde {v}", nova: true },
      { s: "corredor", n: "Corredor", rec: "corredor", rot: "{v} m", nova: true },
      { s: "coletar", n: "Coletar", rec: "coletar", rot: "recorde {v}", nova: true },
      { s: "reacao", n: "Reação", rec: "reacao", rot: "{v} ms", nova: true },
      { s: "piano", n: "Piano", rec: "piano", rot: "recorde {v}", nova: true },
      { s: "atravessar", n: "Atravessar", rec: "atravessar", rot: "{v} travessias", nova: true },
      { s: "basquete", n: "Basquete", rec: "basquete", rot: "{v} cestas", nova: true },
      { s: "hanoi", n: "Torre de Hanói", rec: "hanoiNivel", rot: "{v} discos", nova: true },
      { s: "conta", n: "Conta Rápida", rec: "conta", rot: "{v} certas", nova: true },
      { s: "labirinto", n: "Labirinto 3D", rec: "labirinto", rot: "nível {v}", nova: true },
      { s: "tiro3d", n: "Tiro 3D", rec: "tiro3d", rot: "{v} abates", nova: true },
      { s: "evolucao", n: "Evolução", rec: "evolucao", rot: "era {v}", nova: true },
      { s: "termo", n: "Termo", rec: "termo", rot: "{v} vitórias", nova: true },
      { s: "ligue4", n: "Ligue 4", rec: "ligue4Vitorias", rot: "{v} vitórias", nova: true },
      { s: "ninjafrutas", n: "Ninja Frutas", rec: "ninjafrutas", rot: "recorde {v}", nova: true },
      { s: "passaro", n: "Pássaro", rec: "passaro", rot: "recorde {v}" },
      { s: "torre", n: "Torre", rec: "torre", rot: "{v} andares" },
      { s: "hexagono", n: "Hexágono", rec: "hexagono", rot: "recorde {v}" },
      { s: "2048", n: "2048", rec: "p2048", rot: "recorde {v}" },
      { s: "cobrinha", n: "Cobrinha", rec: "cobrinha", rot: "recorde {v}" },
      { s: "blocos", n: "Blocos", rec: "blocos", rot: "recorde {v}" },
      { s: "doces", n: "Doces", rec: "docesNivel", rot: "nível {v}" },
      { s: "memoria", n: "Jogo da Memória", rec: "memoria", rot: "{v} jogadas" },
      { s: "genius", n: "Genius", rec: "genius", rot: "rodada {v}" },
      { s: "alvo", n: "Acerte o Alvo", rec: "alvo", rot: "recorde {v}" },
      { s: "conquista", n: "Conquista", rec: "conquistaNivel", rot: "nível {v}" },
      { s: "territorio", n: "Território", rec: "territorioVitorias", rot: "{v} vitórias" },
      { s: "naval", n: "Batalha Naval", rec: "navalVitorias", rot: "{v} vitórias" },
      { s: "quiz", n: "Quiz", rec: "quiz", rot: "{v}/10" },
      { s: "ppt", n: "Pedra-Papel-Tesoura", rec: "pptVitorias", rot: "{v} vitórias" },
      { s: "forca", n: "Forca", rec: "forcaNivel", rot: "nível {v}" },
      { s: "campo", n: "Campo Minado", rec: "campoNivel", rot: "nível {v}" },
      { s: "puzzle15", n: "Puzzle 15", rec: "puzzle15", rot: "{v} mov." },
      { s: "cacapalavras", n: "Caça-Palavras", rec: "cacaNivel", rot: "nível {v}" },
    ];
    const PORSLUG = {}; JOGOS.forEach((j) => (PORSLUG[j.s] = j));
    const secoesEl = document.getElementById("secoes");

    function cardHTML(j, i, selo) {
      const rv = Recordes.get(j.rec);
      const recTxt = rv !== undefined ? "🏆 " + j.rot.replace("{v}", rv) : "";
      return `<a class="card-jogo" style="--i:${i};position:relative;" href="games/${j.s}/index.html">
        ${selo || ""}
        <span class="icone" data-icone="${j.s}"></span>
        <span class="nome">${j.n}</span>
        <span class="recorde-card">${recTxt}</span>
      </a>`;
    }

    function secao(titulo, tag, tagClasse, jogos, seloDe) {
      if (!jogos.length) return "";
      const cards = jogos.map((j, i) => cardHTML(j, i, seloDe ? seloDe(j) : (j.nova ? '<span class="selo-novo">NOVO</span>' : ""))).join("");
      return `<div class="secao-titulo">${titulo}${tag ? `<span class="tag ${tagClasse || ""}">${tag}</span>` : ""}</div><main class="grid-jogos">${cards}</main>`;
    }

    function render(presenca) {
      presenca = presenca || {};
      const semana = PORSLUG[JogoDaSemana.atual()];
      const recentes = JSON.parse(localStorage.getItem("recentes") || "[]").map((s) => PORSLUG[s]).filter(Boolean).slice(0, 4);
      const online = JOGOS.filter((j) => j.online);

      let html = "";
      if (semana) html += secao("Jogo da semana", "×2 pontos", "semana", [semana], () => '<span class="selo-x2">×2</span>');
      html += secao("Jogar online", "com amigos", "online", online, (j) => {
        const n = presenca[j.s] || 0;
        return n > 0 ? `<span class="badge-online">${n} jogando</span>` : (j.nova ? '<span class="selo-novo">NOVO</span>' : "");
      });
      if (recentes.length) html += secao("Jogar novamente", "", "", recentes);
      html += secao("Todos os jogos", JOGOS.length + " jogos", "", JOGOS);
      secoesEl.innerHTML = html;
      aplicarIcones();
    }

    render();
    async function atualizar() {
      if (!window.Nuvem) return;
      try { render(await Nuvem.contarOnline()); } catch (e) {}
    }
    atualizar();
    setInterval(atualizar, 15000);
  </script>
</body>
</html>
