<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Conquistas</title>
  <link rel="stylesheet" href="css/estilo.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#121212" />
  <script src="js/tema.js"></script>
</head>
<body>
  <a class="voltar" href="index.html">← voltar</a>

  <header>
    <h1><span class="icone-titulo" data-icone="conquistas"></span> Conquistas</h1>
    <p id="progresso"></p>
  </header>

  <main class="lista-itens" id="lista"></main>

  <script src="js/icones.js"></script>
  <script src="js/util.js"></script>
  <script src="js/pontos.js"></script>
  <script src="js/som.js"></script>
  <script src="js/musica.js"></script>
  <script src="js/recordes.js"></script>
  <script src="js/conquistas.js"></script>
  <script src="js/missoes.js"></script>
  <script src="js/app.js"></script>
  <script>
    Conquistas.verificar();

    const feitas = Conquistas.desbloqueadas();
    const listaEl = document.getElementById("lista");

    document.getElementById("progresso").textContent =
      `${feitas.length} de ${LISTA_CONQUISTAS.length} desbloqueadas`;

    for (const c of LISTA_CONQUISTAS) {
      const desbloqueada = feitas.includes(c.id);
      const card = document.createElement("div");
      card.className = "item-card" + (desbloqueada ? "" : " bloqueada");
      card.innerHTML = `
        <span class="icone">${desbloqueada ? (ICONES[c.icone] || "") : ICONES.cadeado}</span>
        <span class="nome">${c.nome}</span>
        <span class="desc">${c.desc}</span>
      `;
      listaEl.appendChild(card);
    }
  </script>
</body>
</html>
